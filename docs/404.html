<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChromePDF - Page not found</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f5ef;
        --card: #ffffff;
        --ink: #1f2937;
        --muted: #6b7280;
        --line: #d6d1c4;
        --accent: #f59e0b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #fdfbf6 0%, var(--bg) 100%);
        color: var(--ink);
        padding: 24px;
      }

      .card {
        width: min(720px, 100%);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-size: 0.82rem;
        color: var(--accent);
        margin-bottom: 18px;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: var(--accent);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 0 0 14px;
        line-height: 1.65;
        color: var(--muted);
        font-size: 1rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
      }

      .primary {
        background: var(--accent);
        color: #111827;
      }

      .secondary {
        border: 1px solid var(--line);
        color: var(--ink);
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand"><span class="dot"></span>ChromePDF</div>
      <h1>Page not found</h1>
      <p>The GitHub Pages path you opened does not exist. The privacy policy is on the main page.</p>
      <p>If you were looking for the policy, go back to the home page. If you were checking a different route, verify the published Pages URL.</p>
      <div class="actions">
        <a class="primary" href="./">Open privacy policy</a>
        <a class="secondary" href="https://github.com/">Go to GitHub</a>
      </div>
    </main>
  </body>
</html>
