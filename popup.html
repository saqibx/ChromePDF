<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChromePDF</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --card: #161b22;
        --card-border: #2d3748;
        --text: #e6edf3;
        --muted: #9aa7b7;
        --accent: #3b82f6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 320px;
        min-height: 220px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #111827 0%, var(--bg) 100%);
        color: var(--text);
        padding: 16px;
      }

      .card {
        border: 1px solid var(--card-border);
        border-radius: 16px;
        background: var(--card);
        padding: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: var(--accent);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }

      p {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.45;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 12px;
        min-height: 42px;
        padding: 0 14px;
        background: var(--accent);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      input {
        display: none;
      }

      .hint {
        margin-top: 12px;
        font-size: 0.8rem;
        color: #7f8ea3;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand"><span class="dot"></span>ChromePDF</div>
      <h1>Open a PDF</h1>
      <p>Select a PDF from your computer. It opens in the editor immediately after upload.</p>
      <input id="file" type="file" accept="application/pdf" />
      <button id="select">Choose PDF</button>
      <div class="hint">No site access is requested. The file stays local.</div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
