<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChromePDF Viewer</title>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────────────── */
    :root {
      /* User-specified accent trio */
      --accent-navy:   #2f3e57;
      --accent-forest: #2f5742;
      --accent-plum:   #572f53;

      /* Lighter interactive variants */
      --accent-navy-hi:   #4d6e9a;
      --accent-forest-hi: #4a8a68;
      --accent-plum-hi:   #8a4e85;

      /* Surfaces (dark) */
      --bg-base:        #0d1117;
      --bg-viewer:      #111520;
      --bg-toolbar:     #151c2e;
      --bg-sidebar:     #131825;
      --bg-card:        #1a2035;
      --bg-card-hover:  #1f2640;
      --bg-popup:       #1a2035;
      --bg-input:       #111520;

      /* Borders */
      --border:         #232c42;
      --border-light:   #2d3a55;

      /* Text */
      --text-primary:   #d8e0ef;
      --text-secondary: #7a8aab;
      --text-muted:     #454f66;

      /* Misc */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --shadow-page: 0 4px 32px rgba(0,0,0,0.6);
    }

    /* ── Reset ──────────────────────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-navy-hi); }

    /* ── Loading / Error ────────────────────────────────────────────────────── */
    .loading-screen,
    .error-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      background: var(--bg-base);
    }

    .loading-screen p { color: var(--text-secondary); font-size: 14px; }
    .error-screen { color: #e06c75; }
    .error-screen h2 { font-size: 18px; font-weight: 600; }
    .error-screen p { color: var(--text-secondary); font-size: 13px; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent-navy-hi);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── App shell ──────────────────────────────────────────────────────────── */
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Toolbar ────────────────────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      min-height: 52px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--accent-navy);
      gap: 12px;
      flex-shrink: 0;
    }

    .toolbar-left,
    .toolbar-center,
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toolbar-left  { flex: 1; min-width: 0; }
    .toolbar-right { flex: 1; justify-content: flex-end; }

    .doc-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }

    .page-info {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* nav buttons */
    .nav-btn {
      padding: 5px 10px;
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--text-primary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
    }

    .nav-btn:hover:not(:disabled) {
      background: var(--accent-navy);
      border-color: var(--accent-navy-hi);
    }

    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .page-input input {
      width: 46px;
      padding: 5px 6px;
      background: var(--bg-input);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      text-align: center;
      font-size: 13px;
    }

    .page-input input:focus {
      outline: none;
      border-color: var(--accent-navy-hi);
    }

    .scale-control {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .scale-control label { color: var(--text-muted); font-size: 11px; }

    .scale-control input[type="range"] {
      width: 80px;
      accent-color: var(--accent-navy-hi);
      cursor: pointer;
    }

    .scale-control span {
      width: 34px;
      font-size: 11px;
      color: var(--text-secondary);
      text-align: right;
    }

    /* color swatches in toolbar */
    .color-picker-toolbar {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .color-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      flex-shrink: 0;
    }

    .color-btn:hover { transform: scale(1.2); }

    .color-btn.selected {
      border-color: var(--text-primary);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.3);
    }

    .export-btn {
      padding: 6px 14px;
      background: var(--accent-forest);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .export-btn:hover { background: var(--accent-forest-hi); }
    .export-btn:active { transform: scale(0.97); }

    /* ── Selection popup ────────────────────────────────────────────────────── */
    .selection-popup {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-popup);
      border: 1px solid var(--accent-plum);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 1000;
      min-width: 280px;
      max-width: 420px;
    }

    .selection-preview p {
      font-size: 13px;
      font-style: italic;
      color: var(--text-secondary);
      margin-bottom: 10px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .color-select {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .selection-actions { display: flex; gap: 8px; }

    .selection-actions button {
      flex: 1;
      padding: 7px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }

    .selection-actions button:first-child {
      background: var(--accent-plum);
      color: #fff;
      border: none;
    }
    .selection-actions button:first-child:hover { background: var(--accent-plum-hi); }

    .selection-actions button:last-child {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-light);
    }
    .selection-actions button:last-child:hover { background: var(--bg-card-hover); }

    /* ── Main content ───────────────────────────────────────────────────────── */
    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── PDF viewer ─────────────────────────────────────────────────────────── */
    .pdf-viewer {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      padding: 28px 24px;
      background: var(--bg-viewer);
    }

    .pdf-pages {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .pdf-page-container {
      background: #fff;
      box-shadow: var(--shadow-page);
      margin-bottom: 20px;
      border-radius: 2px;
    }

    /* ── Text layer (pdfjs-dist v4) ─────────────────────────────────────────── */
    .text-layer {
      position: absolute;
      top: 0;
      left: 0;
      line-height: 1.0;
      overflow: visible;   /* don't clip spans that extend slightly outside */
    }

    /* scaleX() transforms require 0% 0% origin or text shifts visually */
    .text-layer :is(span, br) {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
    }

    .text-layer ::selection {
      background: rgba(100, 170, 255, 0.35);
    }

    .text-layer .endOfContent {
      display: block;
      position: absolute;
      inset: 100% 0 0;
      z-index: -1;
      cursor: default;
      user-select: none;
    }

    /* ── Highlight layer ────────────────────────────────────────────────────── */
    .highlight-layer {
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
    }

    .pdf-highlight {
      pointer-events: auto;
      border-radius: 2px;
      mix-blend-mode: multiply;
      transition: opacity 0.15s;
    }

    .pdf-highlight:hover { opacity: 0.85 !important; }

    /* page rendering overlay */
    .page-rendering-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(13,17,23,0.75);
      color: var(--text-secondary);
      font-size: 12px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      pointer-events: none;
    }

    /* ── Sidebar ────────────────────────────────────────────────────────────── */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--bg-sidebar);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-toolbar);
    }

    .sidebar-header h2 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .annotation-count {
      background: var(--accent-navy);
      color: var(--accent-navy-hi);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
    }

    .annotation-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
    }

    .empty-state p {
      color: var(--text-muted);
      font-size: 13px;
    }

    .empty-state .hint {
      font-size: 12px;
      margin-top: 8px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ── Annotation cards ───────────────────────────────────────────────────── */
    .annotation-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);  /* overridden by inline style */
      border-radius: var(--radius-md);
      padding: 11px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .annotation-card:hover {
      background: var(--bg-card-hover);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .annotation-card.active {
      background: var(--bg-card-hover);
      border-color: var(--accent-plum);
      border-left-color: var(--accent-plum);
      box-shadow: 0 0 0 1px var(--accent-plum), 0 2px 12px rgba(87,47,83,0.25);
    }

    .annotation-card.resolved {
      opacity: 0.45;
    }

    .annotation-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .page-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--bg-viewer);
      padding: 2px 6px;
      border-radius: 3px;
    }

    .color-picker { display: flex; gap: 4px; }

    .color-picker .color-btn {
      width: 16px;
      height: 16px;
    }

    .highlight-quote {
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-secondary);
      padding-left: 8px;
      margin-bottom: 8px;
      border-left: 2px solid var(--border-light);
      font-style: italic;
    }

    .note-text {
      font-size: 12px;
      line-height: 1.55;
      color: var(--text-primary);
      margin-bottom: 8px;
      min-height: 18px;
    }

    .note-text .placeholder {
      color: var(--text-muted);
      font-style: italic;
      font-size: 12px;
    }

    .note-preview {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .note-heading {
      color: var(--text-primary);
      font-weight: 700;
      line-height: 1.2;
    }

    .note-heading-1 { font-size: 16px; }
    .note-heading-2 { font-size: 14px; }
    .note-heading-3 { font-size: 13px; }

    .note-paragraph,
    .note-quote {
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.55;
    }

    .note-quote {
      margin: 0;
      padding: 7px 9px;
      border-left: 3px solid var(--accent-navy-hi);
      background: rgba(47, 62, 87, 0.08);
      color: var(--text-secondary);
      font-style: italic;
      border-radius: var(--radius-sm);
    }

    .note-code {
      margin: 0;
      padding: 8px 10px;
      background: rgba(22, 27, 34, 0.9);
      color: #f0f4ff;
      border-radius: var(--radius-sm);
      font-size: 11px;
      line-height: 1.5;
      overflow-x: auto;
    }

    .note-math-block {
      padding: 8px 10px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      background: rgba(47, 62, 87, 0.08);
      overflow-x: auto;
      text-align: center;
    }

    .note-math-block .katex-display {
      margin: 0;
    }

    .note-inline-math {
      padding: 1px 4px;
    }

    .note-math-error {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 11px;
      color: var(--accent-plum-hi);
    }

    .note-inline-code {
      padding: 1px 4px;
      border-radius: 4px;
      background: rgba(22, 27, 34, 0.08);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 11px;
    }

    .note-bold { font-weight: 700; }

    .note-strike {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .note-link {
      color: var(--accent-navy-hi);
      text-decoration: underline;
    }

    .note-list {
      margin: 0;
      padding: 4px 0 4px 18px;
      display: grid;
      gap: 4px;
      font-size: 12px;
      line-height: 1.5;
    }

    .note-list li {
      display: flex;
      gap: 6px;
      align-items: flex-start;
      padding: 1px 0;
    }

    .note-list li.is-checked span:last-child {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .note-bullet,
    .note-checkbox {
      width: 12px;
      flex: 0 0 12px;
      color: var(--accent-navy-hi);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }

    .note-checkbox-button {
      appearance: none;
      background: #ffffff;
      border: 1.5px solid rgba(255, 255, 255, 0.6);
      border-radius: 3px;
      padding: 0;
      line-height: 1;
      font-size: 10px;
      cursor: pointer;
    }

    .note-checkbox-button:hover {
      border-color: #ffffff;
      background: rgba(255, 255, 255, 0.9);
    }

    .note-toggle {
      display: flex;
      gap: 6px;
      align-items: flex-start;
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .note-toggle-marker {
      color: var(--text-muted);
      font-weight: 700;
      margin-top: 1px;
    }

    .note-divider {
      border: none;
      border-top: 1px solid var(--border-light);
      margin: 6px 0;
    }

    .note-paragraph {
      padding: 0 2px;
    }

    .note-image-block {
      line-height: 0;
    }

    .note-image {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      display: block;
    }

    .note-edit {
      position: relative;
    }

    .rich-note-editor {
      position: relative;
    }

    .rich-note-editor textarea {
      width: 100%;
      min-height: 56px;
      padding: 7px 9px;
      background: var(--bg-input);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
      margin-bottom: 7px;
    }

    .rich-note-editor textarea:focus {
      outline: none;
      border-color: var(--accent-plum-hi);
    }

    .slash-menu {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% - 2px);
      z-index: 30;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.18);
      max-height: 280px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .slash-menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: rgba(47, 62, 87, 0.08);
      border-bottom: 1px solid var(--border-light);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .slash-menu-item {
      width: 100%;
      padding: 8px 10px;
      border: none;
      background: transparent;
      text-align: left;
      cursor: pointer;
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    }

    .slash-menu-item:last-child { border-bottom: none; }

    .slash-menu-item.active,
    .slash-menu-item:hover {
      background: rgba(47, 62, 87, 0.08);
    }

    .slash-menu-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .slash-menu-description {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .edit-actions { display: flex; gap: 6px; }

    .edit-actions button {
      flex: 1;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }

    .edit-actions button:first-child {
      background: var(--accent-plum);
      color: #fff;
      border: none;
    }
    .edit-actions button:first-child:hover { background: var(--accent-plum-hi); }

    .edit-actions button:last-child {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-light);
    }
    .edit-actions button:last-child:hover { background: var(--bg-card-hover); }

    .annotation-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }

    .timestamp { font-size: 10px; color: var(--text-muted); }

    .annotation-actions { display: flex; gap: 4px; }

    .resolve-btn,
    .delete-btn {
      width: 22px;
      height: 22px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
    }

    .resolve-btn {
      background: rgba(47, 87, 66, 0.4);
      color: var(--accent-forest-hi);
    }
    .resolve-btn:hover { background: rgba(47, 87, 66, 0.7); }

    .resolve-btn.is-resolved {
      background: rgba(87, 47, 83, 0.4);
      color: var(--accent-plum-hi);
    }
    .resolve-btn.is-resolved:hover { background: rgba(87, 47, 83, 0.6); }

    .delete-btn {
      background: rgba(87, 47, 47, 0.35);
      color: #e06c75;
    }
    .delete-btn:hover { background: rgba(87, 47, 47, 0.6); }

    /* ── Upload screen ──────────────────────────────────────────────────────── */
    .drop-zone-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-base);
    }

    .drop-zone {
      border: 2px dashed var(--border-light);
      border-radius: var(--radius-lg);
      padding: 56px 48px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      transition: border-color 0.2s, background 0.2s;
    }

    .drop-zone.dragging {
      border-color: var(--accent-navy-hi);
      background: rgba(47, 62, 87, 0.12);
    }

    .drop-zone:hover {
      border-color: var(--accent-navy-hi);
    }

    .drop-zone-icon {
      font-size: 52px;
      margin-bottom: 20px;
      display: block;
      filter: grayscale(0.2);
    }

    .drop-zone h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .drop-zone p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .file-input { display: none; }

    .upload-btn {
      padding: 10px 28px;
      background: var(--accent-navy);
      color: #fff;
      border: 1px solid var(--accent-navy-hi);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
    }

    .upload-btn:hover {
      background: var(--accent-navy-hi);
      transform: translateY(-1px);
    }

    .upload-btn:active { transform: translateY(0); }

    /* ── Drawing toolbar ────────────────────────────────────────────────────── */
    .draw-btn {
      padding: 5px 10px;
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--text-primary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .draw-btn:hover { background: var(--accent-navy); border-color: var(--accent-navy-hi); }
    .draw-btn.active { background: var(--accent-plum); border-color: var(--accent-plum-hi); color: #fff; }

    .stroke-width-picker { display: flex; align-items: center; gap: 4px; }

    .stroke-btn {
      width: 26px;
      height: 26px;
      border: 1px solid var(--border-light);
      background: transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .stroke-btn:hover { background: var(--bg-card); }
    .stroke-btn.selected { background: var(--accent-navy); border-color: var(--accent-navy-hi); }
    .stroke-btn span { background: var(--text-primary); border-radius: 50%; display: block; }

    .annotation-type-badge {
      font-size: 10px;
      padding: 2px 6px;
      background: rgba(47, 62, 87, 0.4);
      border-radius: 3px;
      color: var(--text-secondary);
    }

    .drawing-preview {
      font-size: 12px;
      color: var(--text-muted);
      padding: 4px 8px;
      margin-bottom: 8px;
    }

    /* ── Home page ──────────────────────────────────────────────────────────── */
    .home-page {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--bg-base);
    }

    .home-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 60px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    .home-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .home-logo-icon { font-size: 22px; line-height: 1; }

    .home-logo-text {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .home-upload-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 18px;
      background: var(--accent-navy);
      color: #fff;
      border: 1px solid var(--accent-navy-hi);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .home-upload-btn:hover { background: var(--accent-navy-hi); transform: translateY(-1px); }
    .home-upload-btn:active { transform: none; }

    .home-content {
      flex: 1;
      padding: 36px 32px 48px;
      overflow-y: auto;
    }

    .home-section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }

    .home-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .home-section-count {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
    }

    /* ── Document grid ──────────────────────────────────────────────────────── */
    .doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 18px;
    }

    .doc-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .doc-card:hover {
      border-color: var(--accent-navy-hi);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      transform: translateY(-3px);
    }

    .doc-card-thumb {
      width: 100%;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .doc-card-thumb canvas {
      width: 100%;
      height: auto;
      display: block;
    }
    .doc-thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      opacity: 0.15;
      background: var(--bg-viewer);
    }

    .doc-card-info {
      padding: 13px 14px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .doc-card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .doc-card-meta {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .doc-card-meta-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .doc-card-meta-sep {
      color: var(--border-light);
    }

    .doc-card-date {
      font-size: 11px;
      color: var(--text-muted);
    }

    .doc-card-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(13,17,23,0.75);
      border: 1px solid var(--border-light);
      color: #e06c75;
      font-size: 16px;
      cursor: pointer;
      opacity: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s, background 0.15s;
      line-height: 1;
    }
    .doc-card:hover .doc-card-delete { opacity: 1; }
    .doc-card-delete:hover { background: rgba(87, 47, 47, 0.85); }

    /* ── Home empty / upload state ──────────────────────────────────────────── */
    .home-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
    }

    .home-empty-zone {
      border: 2px dashed var(--border-light);
      border-radius: var(--radius-lg);
      padding: 64px 56px;
      text-align: center;
      max-width: 440px;
      width: 100%;
      transition: border-color 0.2s, background 0.2s;
    }
    .home-empty-zone.dragging,
    .home-empty-zone:hover {
      border-color: var(--accent-navy-hi);
      background: rgba(47, 62, 87, 0.07);
    }

    .home-empty-icon {
      font-size: 60px;
      display: block;
      margin-bottom: 22px;
      filter: grayscale(0.2);
    }

    .home-empty-zone h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .home-empty-zone p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .home-empty-btn {
      padding: 11px 34px;
      background: var(--accent-navy);
      color: #fff;
      border: 1px solid var(--accent-navy-hi);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
    }
    .home-empty-btn:hover { background: var(--accent-navy-hi); transform: translateY(-1px); }
    .home-empty-btn:active { transform: none; }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-screen">
      <div class="spinner"></div>
      <p>Loading ChromePDF Viewer...</p>
    </div>
  </div>
  <script type="module" src="./viewer/viewer-main.tsx"></script>
</body>
</html>
